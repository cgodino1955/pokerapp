<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Poker Hand Tracker</title>
<meta name="description" content="Track your poker hands, hand histories, and session stats.">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1B4638">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Poker Hand Tracker">
<link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-180.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@400;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --felt-dark:#122A22;
    --felt:#1B4638;
    --felt-light:#235948;
    --cream:#EFE7D6;
    --cream-dim:#D9CFB8;
    --ink:#201E19;
    --red:#B23A48;
    --gold:#C9A227;
    --line: rgba(239,231,214,0.14);
    --line-strong: rgba(239,231,214,0.28);
    --win: #6FA97C;
    --loss: #C25B54;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; height:100%;}
  body{
    background: radial-gradient(120% 140% at 50% -10%, var(--felt-light) 0%, var(--felt) 45%, var(--felt-dark) 100%);
    color: var(--cream);
    font-family:'Inter', sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
  }
  #app{
    width:100%;
    max-width:480px;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    position:relative;
  }

  /* ---------- Header ---------- */
  header{
    padding:18px 20px 14px;
    border-bottom:1px solid var(--line);
    position:sticky; top:0; z-index:20;
    background:linear-gradient(180deg, var(--felt-dark) 0%, rgba(18,42,34,0.96) 80%, rgba(18,42,34,0.85) 100%);
    backdrop-filter: blur(6px);
  }
  .brand{
    font-family:'Roboto Slab', serif;
    font-weight:700;
    font-size:22px;
    letter-spacing:0.02em;
    display:flex; align-items:baseline; gap:8px;
  }
  .brand .suits{ color:var(--gold); font-size:15px; letter-spacing:2px; }
  .session-line{
    margin-top:6px;
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    color:var(--cream-dim);
    display:flex; justify-content:space-between;
  }
  .session-line .net.pos{ color:var(--win); }
  .session-line .net.neg{ color:var(--loss); }

  .night-bar{
    margin-top:10px;
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding:10px 12px;
    background:rgba(201,162,39,0.08);
    border:1px solid var(--line-strong);
    border-radius:8px;
  }
  .night-status{
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    color:var(--cream-dim);
  }
  .night-status.live{ color:var(--gold); }
  .night-btn{
    flex-shrink:0;
    padding:8px 14px;
    border-radius:7px;
    border:1px solid var(--gold);
    background:transparent;
    color:var(--gold);
    font-family:'JetBrains Mono', monospace;
    font-weight:600;
    font-size:12px;
    cursor:pointer;
  }
  .night-btn.end{ border-color:var(--loss); color:var(--loss); }

  main{ flex:1; padding:18px 16px 100px; }

  select{
    width:100%;
    background:rgba(0,0,0,0.2);
    border:1px solid var(--line-strong);
    border-radius:8px;
    padding:10px 12px;
    color:var(--cream);
    font-family:'JetBrains Mono', monospace;
    font-size:14px;
    margin-bottom:16px;
  }

  /* ---------- Auth gate ---------- */
  .auth-gate{
    position:fixed; inset:0; z-index:50;
    display:flex; align-items:center; justify-content:center;
    background: radial-gradient(120% 140% at 50% -10%, var(--felt-light) 0%, var(--felt) 45%, var(--felt-dark) 100%);
    padding:24px;
  }
  .auth-card{
    width:100%; max-width:360px;
    background: rgba(239,231,214,0.05);
    border:1px solid var(--line);
    border-radius:14px;
    padding:28px 22px;
    text-align:center;
  }
  .auth-card .brand{ justify-content:center; margin-bottom:10px; }
  .auth-sub{
    font-size:13px; color:var(--cream-dim); line-height:1.5;
    margin:0;
  }

  h2.section-title{
    font-family:'Roboto Slab', serif;
    font-size:15px;
    text-transform:uppercase;
    letter-spacing:0.08em;
    color:var(--gold);
    margin:0 0 12px;
    display:flex; align-items:center; gap:10px;
  }
  h2.section-title::after{
    content:''; flex:1; height:1px; background:var(--line);
  }

  .card-block{
    background: rgba(239,231,214,0.05);
    border:1px solid var(--line);
    border-radius:10px;
    padding:16px;
    margin-bottom:16px;
  }

  label.field-label{
    display:block;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.07em;
    color:var(--cream-dim);
    margin-bottom:8px;
  }

  .chip-row{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px; }
  .chip{
    padding:8px 13px;
    border-radius:20px;
    border:1px solid var(--line-strong);
    background:transparent;
    color:var(--cream);
    font-family:'JetBrains Mono', monospace;
    font-size:13px;
    cursor:pointer;
    transition: all .15s ease;
  }
  .chip:active{ transform: scale(0.96); }
  .chip.selected{
    background:var(--gold);
    border-color:var(--gold);
    color:var(--ink);
    font-weight:600;
  }

  input[type=number], input[type=text]{
    width:100%;
    background:rgba(0,0,0,0.2);
    border:1px solid var(--line-strong);
    border-radius:8px;
    padding:10px 12px;
    color:var(--cream);
    font-family:'JetBrains Mono', monospace;
    font-size:15px;
  }
  input::placeholder{ color:rgba(239,231,214,0.35); }
  input:focus, .chip:focus, button:focus{ outline:2px solid var(--gold); outline-offset:1px; }

  .two-col{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }

  /* card picker */
  .card-slots{ display:flex; gap:8px; margin-bottom:12px; }
  .card-slot{
    width:46px; height:62px;
    border:1.5px dashed var(--line-strong);
    border-radius:7px;
    display:flex; align-items:center; justify-content:center;
    font-family:'Roboto Slab', serif;
    font-weight:700;
    font-size:16px;
    background:rgba(0,0,0,0.15);
    color: var(--cream);
    position:relative;
  }
  .card-slot.filled{
    background:var(--cream);
    color:var(--ink);
    border-style:solid;
    border-color:var(--cream);
  }
  .card-slot.filled.red{ color:var(--red); }
  .card-slot .clear-x{
    position:absolute; top:-6px; right:-6px;
    width:18px;height:18px;border-radius:50%;
    background:var(--felt-dark); color:var(--cream);
    border:1px solid var(--line-strong);
    font-size:11px; display:flex; align-items:center; justify-content:center;
    cursor:pointer;
  }
  .picker{
    border-top:1px solid var(--line);
    padding-top:12px;
    margin-top:4px;
  }
  .rank-grid{ display:grid; grid-template-columns:repeat(7,1fr); gap:6px; margin-bottom:8px; }
  .rank-btn{
    padding:8px 0;
    text-align:center;
    border:1px solid var(--line-strong);
    border-radius:6px;
    background:rgba(0,0,0,0.15);
    color:var(--cream);
    font-family:'JetBrains Mono', monospace;
    font-size:13px;
    cursor:pointer;
  }
  .suit-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:6px; }
  .suit-btn{
    padding:10px 0; text-align:center;
    border:1px solid var(--line-strong);
    border-radius:6px;
    background:rgba(0,0,0,0.15);
    font-size:18px; cursor:pointer;
  }
  .suit-btn.s, .suit-btn.c{ color:var(--cream); }
  .suit-btn.h, .suit-btn.d{ color:var(--red); }

  textarea{
    width:100%; min-height:56px;
    background:rgba(0,0,0,0.2);
    border:1px solid var(--line-strong);
    border-radius:8px;
    padding:10px 12px;
    color:var(--cream);
    font-family:'Inter', sans-serif;
    font-size:14px;
    resize:vertical;
  }

  .save-btn{
    width:100%;
    padding:14px;
    border-radius:9px;
    border:none;
    background:var(--gold);
    color:var(--ink);
    font-family:'Roboto Slab', serif;
    font-weight:700;
    font-size:15px;
    letter-spacing:0.03em;
    cursor:pointer;
    margin-top:6px;
  }
  .save-btn:active{ transform: scale(0.98); }
  .save-btn:disabled{ opacity:0.4; }

  .fold-banner{
    text-align:center;
    padding:10px;
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    color:var(--cream-dim);
    border:1px dashed var(--line-strong);
    border-radius:8px;
    margin-bottom:16px;
  }
  .pick-hint{
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    color:var(--gold);
    margin-top:2px;
  }
  .card-warn{
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    color:var(--loss);
    margin-top:6px;
    display:none;
  }

  /* ---------- History ---------- */
  .hand-row{
    background:rgba(239,231,214,0.05);
    border:1px solid var(--line);
    border-radius:10px;
    padding:12px 14px;
    margin-bottom:10px;
    cursor:pointer;
  }
  .hand-row-top{
    display:flex; justify-content:space-between; align-items:center;
  }
  .hand-cards-mini{ display:flex; gap:4px; }
  .mini-card{
    width:26px; height:34px; border-radius:4px;
    background:var(--cream); color:var(--ink);
    display:flex; align-items:center; justify-content:center;
    font-family:'JetBrains Mono', monospace; font-weight:700; font-size:12px;
  }
  .mini-card.red{ color:var(--red); }
  .hand-meta{ font-family:'JetBrains Mono', monospace; font-size:11px; color:var(--cream-dim); }
  .hand-net{ font-family:'JetBrains Mono', monospace; font-weight:700; font-size:15px; text-transform:uppercase; }
  .hand-net.pos{ color:var(--win); }
  .hand-net.neg{ color:var(--loss); }
  .hand-net.chop{ color:var(--gold); }
  .hand-detail{
    margin-top:10px; padding-top:10px; border-top:1px solid var(--line);
    font-size:13px; line-height:1.6; color:var(--cream-dim);
    display:none;
  }
  .hand-row.open .hand-detail{ display:block; }
  .del-btn{
    margin-top:10px; font-size:11px; color:var(--loss);
    background:none; border:1px solid var(--loss); border-radius:6px;
    padding:5px 10px; cursor:pointer; font-family:'JetBrains Mono', monospace;
  }
  .empty-state{
    text-align:center; padding:60px 20px; color:var(--cream-dim);
    font-family:'JetBrains Mono', monospace; font-size:13px;
  }

  /* ---------- Stats ---------- */
  .stat-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; }
  .stat-tile{
    background:rgba(239,231,214,0.05);
    border:1px solid var(--line);
    border-radius:10px;
    padding:14px;
  }
  .stat-num{
    font-family:'Roboto Slab', serif; font-weight:700; font-size:24px;
  }
  .stat-num.pos{ color:var(--win); }
  .stat-num.neg{ color:var(--loss); }
  .stat-label{ font-size:11px; color:var(--cream-dim); text-transform:uppercase; letter-spacing:0.06em; margin-top:4px;}
  .pos-bar-row{ display:flex; align-items:center; gap:10px; margin-bottom:8px; font-family:'JetBrains Mono', monospace; font-size:12px;}
  .pos-bar-label{ width:36px; color:var(--cream-dim); }
  .pos-bar-track{ flex:1; height:8px; background:rgba(0,0,0,0.25); border-radius:4px; overflow:hidden;}
  .pos-bar-fill{ height:100%; border-radius:4px; }
  .pos-bar-val{ width:56px; text-align:right; }

  /* ---------- Tab bar ---------- */
  nav.tabbar{
    position:fixed; bottom:0; left:50%; transform:translateX(-50%);
    width:100%; max-width:480px;
    display:flex;
    background: rgba(18,42,34,0.97);
    border-top:1px solid var(--line);
    backdrop-filter: blur(6px);
    z-index:30;
    padding-bottom: env(safe-area-inset-bottom, 0px);
  }
  nav.tabbar button{
    flex:1; padding:12px 0 10px; background:none; border:none;
    color:var(--cream-dim); font-family:'Inter', sans-serif; font-size:11px;
    display:flex; flex-direction:column; align-items:center; gap:4px;
    cursor:pointer;
  }
  nav.tabbar button .icon{ font-size:18px; }
  nav.tabbar button.active{ color:var(--gold); }

  .view{ display:none; }
  .view.active{ display:block; }

  ::-webkit-scrollbar{ width:0; height:0; }
</style>
</head>
<body>

<div id="auth-gate" class="auth-gate">
  <div class="auth-card">
    <div class="brand">Poker Hand Tracker <span class="suits">♠ ♥ ♦ ♣</span></div>
    <p class="auth-sub" id="auth-status">Setting up your session…</p>
  </div>
</div>

<div id="app" style="display:none;">

  <header>
    <div class="brand">Poker Hand Tracker <span class="suits">♠ ♥ ♦ ♣</span></div>
    <div class="session-line">
      <span id="hand-count">0 hands logged</span>
      <span id="session-net" class="net">—</span>
    </div>
    <div class="night-bar" id="night-bar">
      <span class="night-status" id="night-status">No night in progress</span>
      <button class="night-btn" id="night-toggle-btn" type="button">Start Night</button>
    </div>
  </header>

  <main>

    <!-- ============ LOG VIEW ============ -->
    <section id="view-log" class="view active">

      <h2 class="section-title">Setup</h2>
      <div class="card-block">
        <label class="field-label">Your Position</label>
        <div class="chip-row" id="position-chips"></div>
        <label class="field-label">Blinds</label>
        <div class="chip-row" id="blinds-chips"></div>
        <div class="two-col" id="custom-blinds-wrap" style="display:none;">
          <div>
            <label class="field-label">Small Blind</label>
            <input type="number" id="sb-input" placeholder="1" inputmode="decimal">
          </div>
          <div>
            <label class="field-label">Big Blind</label>
            <input type="number" id="bb-input" placeholder="2" inputmode="decimal">
          </div>
        </div>
      </div>

      <h2 class="section-title">Hole Cards</h2>
      <div class="card-block">
        <div class="card-slots" id="hole-slots"></div>
        <div class="picker" id="hole-picker"></div>
      </div>

      <h2 class="section-title">Preflop</h2>
      <div class="card-block">
        <label class="field-label">Your Action</label>
        <div class="chip-row" id="preflop-action-chips"></div>
        <div id="preflop-call-wrap" style="display:none;">
          <label class="field-label" id="preflop-call-label">Call Amount</label>
          <div class="chip-row" id="preflop-call-chips"></div>
          <input type="number" id="preflop-call-amount" inputmode="decimal">
        </div>
        <div id="preflop-raise-wrap" style="display:none;">
          <label class="field-label">Raise To</label>
          <div class="chip-row" id="preflop-raise-chips"></div>
          <input type="number" id="preflop-raise-amount" inputmode="decimal">
        </div>
      </div>

      <div id="street-flop-wrap" style="display:none;">
        <h2 class="section-title">Flop</h2>
        <div class="card-block">
          <div class="card-slots" id="flop-slots"></div>
          <div class="picker" id="flop-picker"></div>
          <div class="pick-hint" id="flop-hint" style="display:none;"></div>
          <label class="field-label" style="margin-top:10px;" id="flop-action-label">Your Action</label>
          <div class="chip-row" id="flop-action-chips"></div>
          <div id="flop-call-wrap" style="display:none;">
            <label class="field-label" id="flop-call-label">Amount</label>
            <div class="chip-row" id="flop-call-chips"></div>
            <input type="number" id="flop-call-amount" inputmode="decimal">
          </div>
          <div id="flop-raise-wrap" style="display:none;">
            <label class="field-label">Raise To</label>
            <div class="chip-row" id="flop-raise-chips"></div>
            <input type="number" id="flop-raise-amount" inputmode="decimal">
          </div>
        </div>
      </div>

      <div id="street-turn-wrap" style="display:none;">
        <h2 class="section-title">Turn</h2>
        <div class="card-block">
          <div class="card-slots" id="turn-slots"></div>
          <div class="picker" id="turn-picker"></div>
          <div class="pick-hint" id="turn-hint" style="display:none;"></div>
          <label class="field-label" style="margin-top:10px;" id="turn-action-label">Your Action</label>
          <div class="chip-row" id="turn-action-chips"></div>
          <div id="turn-call-wrap" style="display:none;">
            <label class="field-label" id="turn-call-label">Amount</label>
            <div class="chip-row" id="turn-call-chips"></div>
            <input type="number" id="turn-call-amount" inputmode="decimal">
          </div>
          <div id="turn-raise-wrap" style="display:none;">
            <label class="field-label">Raise To</label>
            <div class="chip-row" id="turn-raise-chips"></div>
            <input type="number" id="turn-raise-amount" inputmode="decimal">
          </div>
        </div>
      </div>

      <div id="street-river-wrap" style="display:none;">
        <h2 class="section-title">River</h2>
        <div class="card-block">
          <div class="card-slots" id="river-slots"></div>
          <div class="picker" id="river-picker"></div>
          <div class="pick-hint" id="river-hint" style="display:none;"></div>
          <label class="field-label" style="margin-top:10px;" id="river-action-label">Your Action</label>
          <div class="chip-row" id="river-action-chips"></div>
          <div id="river-call-wrap" style="display:none;">
            <label class="field-label" id="river-call-label">Amount</label>
            <div class="chip-row" id="river-call-chips"></div>
            <input type="number" id="river-call-amount" inputmode="decimal">
          </div>
          <div id="river-raise-wrap" style="display:none;">
            <label class="field-label">Raise To</label>
            <div class="chip-row" id="river-raise-chips"></div>
            <input type="number" id="river-raise-amount" inputmode="decimal">
          </div>
        </div>
      </div>

      <div id="folded-banner" class="fold-banner" style="display:none;"></div>

      <h2 class="section-title">Outcome</h2>
      <div class="card-block">
        <label class="field-label">Result</label>
        <div class="chip-row" id="result-chips"></div>
        <label class="field-label">Reached Showdown?</label>
        <div class="chip-row" id="showdown-chips"></div>
        <label class="field-label">Notes (optional)</label>
        <textarea id="notes-input" placeholder="e.g. 3-bet from CO, opponent had AK"></textarea>
      </div>

      <button class="save-btn" id="save-hand-btn">Save Hand</button>
    </section>

    <!-- ============ HISTORY VIEW ============ -->
    <section id="view-history" class="view">
      <h2 class="section-title">Hand History</h2>
      <div id="history-list"></div>
    </section>

    <!-- ============ STATS VIEW ============ -->
    <section id="view-stats" class="view">
      <label class="field-label">Viewing</label>
      <select id="stats-session-select"></select>

      <h2 class="section-title">Overview</h2>
      <div class="stat-grid" id="stat-grid-top"></div>

      <h2 class="section-title">Preflop Tendencies</h2>
      <div class="stat-grid" id="stat-grid-preflop"></div>

      <h2 class="section-title">Win Rate by Position</h2>
      <div class="card-block" id="pos-breakdown"></div>

      <h2 class="section-title">Showdown</h2>
      <div class="stat-grid" id="stat-grid-showdown"></div>
    </section>

  </main>

  <nav class="tabbar">
    <button class="tab-btn active" data-view="log"><span class="icon">✎</span>Log Hand</button>
    <button class="tab-btn" data-view="history"><span class="icon">☰</span>History</button>
    <button class="tab-btn" data-view="stats"><span class="icon">◈</span>Stats</button>
  </nav>

</div>

<script>
  if('serviceWorker' in navigator){
    window.addEventListener('load', ()=>{
      navigator.serviceWorker.register('sw.js').catch(err=>console.error('SW registration failed', err));
    });
  }
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function(){

  // ---------------- Supabase config ----------------
  // Public project URL + anon key — safe to expose client-side, access to
  // the `hands` table is enforced by Postgres row-level security policies
  // (see supabase-schema.sql), not by keeping this key secret.
  const SUPABASE_URL = 'https://lskcchpcipbmlwkcjzno.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_7XsfF3yHITN_3OgRxZCNfg_k1HrqTl5';

  if(SUPABASE_URL === 'YOUR_SUPABASE_URL' || SUPABASE_ANON_KEY === 'YOUR_SUPABASE_ANON_KEY'){
    document.getElementById('auth-gate').innerHTML =
      '<div class="auth-card"><div class="brand">Poker Hand Tracker <span class="suits">♠ ♥ ♦ ♣</span></div>' +
      '<p class="auth-sub">Not connected to a database yet — set SUPABASE_URL and SUPABASE_ANON_KEY near the top of the script in index.html.</p></div>';
    throw new Error('Supabase not configured — set SUPABASE_URL and SUPABASE_ANON_KEY in index.html');
  }

  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const RANKS = ['2','3','4','5','6','7','8','9','T','J','Q','K','A'];
  const SUITS = [
    {sym:'♠', code:'s', red:false},
    {sym:'♥', code:'h', red:true},
    {sym:'♦', code:'d', red:true},
    {sym:'♣', code:'c', red:false},
  ];
  const POSITIONS = ['SB','BB','UTG','UTG+1','MP','MP+1','HJ','CO','BTN'];
  const ACTIONS_PRE = ['Fold','Call','Raise'];
  const ACTIONS_POST = ['Check','Bet','Call','Raise','Fold'];
  const BLIND_PRESETS = ['10/20','25/50','50/100','100/200','200/400','500/1000','1000/2000','Custom'];

  let hands = [];
  let sessions = [];
  let activeSession = null;
  let statsSessionId = null; // null = not yet defaulted; 'all' or a session id after that

  // ---------------- auth ----------------
  function showAuthGate(){
    document.getElementById('auth-gate').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
  }
  function showApp(){
    document.getElementById('auth-gate').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
  }

  // No login form — a private, anonymous session is created automatically
  // on first visit and persists in this browser (Supabase stores the
  // session token in localStorage), so hands stay tied to this device
  // without any email/password step. Clearing browser data starts a new,
  // unrelated anonymous identity with no access to prior hands.
  let anonSignInAttempted = false;
  supabaseClient.auth.onAuthStateChange((event, session)=>{
    if(session){
      anonSignInAttempted = false;
      showApp();
      loadAll();
    } else if(!anonSignInAttempted){
      anonSignInAttempted = true;
      showAuthGate();
      supabaseClient.auth.signInAnonymously().then(({error})=>{
        if(error){
          document.getElementById('auth-status').textContent =
            'Could not start a session: ' + error.message + '. Make sure "Allow anonymous sign-ins" is enabled in Supabase (Authentication > Providers).';
        }
      });
    }
  });

  // ---------------- storage (Supabase) ----------------
  // Each row is private to the signed-in user via row-level security, so no
  // client-side filtering by user is needed — the query only ever returns
  // the caller's own hands/sessions.
  async function loadHandsData(){
    const { data, error } = await supabaseClient
      .from('hands')
      .select('*')
      .order('ts', { ascending: false });
    hands = error ? [] : data;
  }
  async function loadSessionsData(){
    const { data, error } = await supabaseClient
      .from('sessions')
      .select('*')
      .order('started_at', { ascending: false });
    sessions = error ? [] : data;
    activeSession = sessions.find(s=>!s.ended_at) || null;
  }
  async function loadAll(){
    await Promise.all([loadHandsData(), loadSessionsData()]);
    renderHistory();
    renderNightBar();
    populateStatsSessionSelect();
    renderStats();
    updateHeader();
  }

  // ---------------- night (session) controls ----------------
  // A "night" groups hands together so stats can be viewed per-session
  // instead of only as one all-time lifetime aggregate. Hands can only be
  // logged while a night is open, and only one night can be open at a time.
  function renderNightBar(){
    const statusEl = document.getElementById('night-status');
    const btn = document.getElementById('night-toggle-btn');
    if(activeSession){
      const startedStr = new Date(activeSession.started_at).toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'});
      const nightHands = hands.filter(h=>h.session_id === activeSession.id);
      const decided = nightHands.filter(h=>h.result==='Won' || h.result==='Lost');
      const winPct = decided.length ? Math.round(100*decided.filter(h=>h.result==='Won').length/decided.length) : null;
      statusEl.textContent = 'Night in progress · started ' + startedStr + ' · ' + nightHands.length + (nightHands.length===1?' hand':' hands') + (winPct!==null ? ' · ' + winPct + '% won' : '');
      statusEl.className = 'night-status live';
      btn.textContent = 'End Night';
      btn.className = 'night-btn end';
    } else {
      statusEl.textContent = 'No night in progress';
      statusEl.className = 'night-status';
      btn.textContent = 'Start Night';
      btn.className = 'night-btn';
    }
  }

  document.getElementById('night-toggle-btn').addEventListener('click', async ()=>{
    if(activeSession){
      if(!confirm('End tonight\'s session? You can start a new one any time.')) return;
      const { error } = await supabaseClient.from('sessions').update({ ended_at: Date.now() }).eq('id', activeSession.id);
      if(error){ alert('Could not end night: ' + error.message); return; }
    } else {
      const { error } = await supabaseClient.from('sessions').insert({ started_at: Date.now() });
      if(error){ alert('Could not start night: ' + error.message); return; }
    }
    await loadSessionsData();
    renderNightBar();
    populateStatsSessionSelect();
    renderStats();
    updateHeader();
  });

  // ---------------- stats session picker ----------------
  function populateStatsSessionSelect(){
    const sel = document.getElementById('stats-session-select');
    sel.innerHTML = '';
    const allOpt = document.createElement('option');
    allOpt.value = 'all';
    allOpt.textContent = 'All Time';
    sel.appendChild(allOpt);
    sessions.forEach(s=>{
      const opt = document.createElement('option');
      opt.value = s.id;
      const d = new Date(s.started_at);
      const dateStr = d.toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'});
      const timeStr = d.toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'});
      opt.textContent = dateStr + ' ' + timeStr + (s.ended_at ? '' : ' (in progress)');
      sel.appendChild(opt);
    });
    if(statsSessionId === null){
      statsSessionId = activeSession ? activeSession.id : 'all';
    }
    sel.value = statsSessionId;
  }
  document.getElementById('stats-session-select').addEventListener('change', (e)=>{
    statsSessionId = e.target.value;
    renderStats();
  });
  function handsForStatsSelection(){
    return statsSessionId === 'all' ? hands : hands.filter(h=>h.session_id === statsSessionId);
  }

  // ---------------- state for the in-progress form ----------------
  let state = {
    position: null,
    blindChoice: null,
    sb: '', bb: '',
    hole: [null, null],
    preflopAction: null,
    flop: [null,null,null],
    flopAction: null,
    turn: [null],
    turnAction: null,
    river: [null],
    riverAction: null,
    result: null,
    showdown: null,
  };

  function resetState(){
    // keep blindChoice/sb/bb — same table usually keeps the same stakes hand to hand
    const keepBlindChoice = state.blindChoice;
    const keepSb = state.sb;
    const keepBb = state.bb;
    state = {
      position: null, blindChoice: keepBlindChoice, sb:keepSb, bb:keepBb,
      hole:[null,null],
      preflopAction:null,
      flop:[null,null,null], flopAction:null,
      turn:[null], turnAction:null,
      river:[null], riverAction:null,
      result:null, showdown:null,
    };
    if(keepBlindChoice !== null){
      document.getElementById('sb-input').value = keepSb;
      document.getElementById('bb-input').value = keepBb;
    } else {
      document.getElementById('sb-input').value='';
      document.getElementById('bb-input').value='';
    }
    document.getElementById('notes-input').value='';
    document.getElementById('preflop-raise-amount').value='';
    document.getElementById('flop-raise-amount').value='';
    document.getElementById('turn-raise-amount').value='';
    document.getElementById('river-raise-amount').value='';
    document.getElementById('preflop-call-amount').value='';
    document.getElementById('flop-call-amount').value='';
    document.getElementById('turn-call-amount').value='';
    document.getElementById('river-call-amount').value='';
    renderAll();
  }

  // ---------------- chip row builder ----------------
  function buildChipRow(containerId, options, currentGetter, onSelect){
    const el = document.getElementById(containerId);
    el.innerHTML = '';
    options.forEach(opt=>{
      const b = document.createElement('button');
      b.className = 'chip' + (currentGetter()===opt ? ' selected' : '');
      b.textContent = opt;
      b.type = 'button';
      b.addEventListener('click', ()=>{ onSelect(opt); renderAll(); });
      el.appendChild(b);
    });
  }

  // ---------------- card slot + picker builder ----------------
  function getAllUsedCardKeys(excludeArr){
    const all = [];
    [state.hole, state.flop, state.turn, state.river].forEach(arr=>{
      if(arr === excludeArr) return; // allow re-checking within the same slot group without self-blocking on re-render
      arr.forEach(c=>{ if(c) all.push(c.rank + c.suit); });
    });
    return all;
  }

  function buildCardUI(slotsId, pickerId, cardsArr, onChange){
    const slotsEl = document.getElementById(slotsId);
    slotsEl.innerHTML = '';
    cardsArr.forEach((c, idx)=>{
      const slot = document.createElement('div');
      slot.className = 'card-slot' + (c ? ' filled' + (c.red ? ' red':'') : '');
      slot.textContent = c ? (c.rank + c.suit) : '?';
      if(c){
        const x = document.createElement('span');
        x.className='clear-x'; x.textContent='×';
        x.addEventListener('click',(e)=>{ e.stopPropagation(); cardsArr[idx]=null; onChange(); renderAll(); });
        slot.appendChild(x);
      }
      slotsEl.appendChild(slot);
    });

    const pickerEl = document.getElementById(pickerId);
    const nextEmpty = cardsArr.findIndex(c=>!c);
    if(nextEmpty === -1){ pickerEl.innerHTML=''; return; }

    pickerEl.innerHTML = '';
    const rankGrid = document.createElement('div');
    rankGrid.className='rank-grid';
    let pendingRank = pickerEl.dataset.pendingRank || null;

    RANKS.forEach(r=>{
      const b = document.createElement('div');
      b.className='rank-btn';
      b.textContent = r;
      if(pendingRank === r) b.style.background = 'var(--gold)', b.style.color='var(--ink)';
      b.addEventListener('click', ()=>{
        pickerEl.dataset.pendingRank = r;
        buildCardUI(slotsId, pickerId, cardsArr, onChange);
      });
      rankGrid.appendChild(b);
    });
    pickerEl.appendChild(rankGrid);

    const suitGrid = document.createElement('div');
    suitGrid.className='suit-grid';
    SUITS.forEach(s=>{
      const b = document.createElement('div');
      b.className = 'suit-btn ' + s.code;
      b.textContent = s.sym;
      b.addEventListener('click', ()=>{
        const rank = pickerEl.dataset.pendingRank;
        if(!rank) return;
        const key = rank + s.sym;
        const used = getAllUsedCardKeys(cardsArr).concat(
          cardsArr.filter((c,i)=>c && i!==nextEmpty).map(c=>c.rank+c.suit)
        );
        if(used.includes(key)){
          pickerEl.dataset.pendingRank = '';
          buildCardUI(slotsId, pickerId, cardsArr, onChange);
          const newWarn = pickerEl.querySelector('.card-warn');
          if(newWarn){
            newWarn.textContent = key + ' is already in this hand — pick a different card.';
            newWarn.style.display = 'block';
          }
          return;
        }
        cardsArr[nextEmpty] = {rank, suit:s.sym, red:s.red};
        pickerEl.dataset.pendingRank = '';
        onChange();
        renderAll();
      });
      suitGrid.appendChild(b);
    });
    pickerEl.appendChild(suitGrid);

    const warnEl = document.createElement('div');
    warnEl.className = 'card-warn';
    pickerEl.appendChild(warnEl);
  }

  // ---------------- amount resolution ----------------
  // The dollar amount tied to a given street's action: the raise-to size for
  // Raise, the bet/call size for Bet/Call (read from that street's amount
  // input, defaulting to the big blind), or null for Fold/Check.
  function streetAmount(street, action){
    if(!action || action === 'Fold' || action === 'Check') return null;
    if(action === 'Raise'){
      const v = document.getElementById(street+'-raise-amount').value;
      return v !== '' ? v : state.bb;
    }
    // Bet or Call — read from that street's own amount input. Preflop calls
    // aren't always just the big blind (you might be calling a 3-bet), so
    // it gets an editable field too, same as the postflop streets. Save is
    // blocked before this runs if it's empty, so state.bb is just a
    // defensive fallback, not the normal path.
    const v = document.getElementById(street+'-call-amount').value;
    return v !== '' ? v : state.bb;
  }

  // Call/Bet amounts are never pre-filled (see buildBBMultipleChips), so
  // before saving we make sure every street that's actually in play with a
  // Call or Bet action has had its amount explicitly chosen.
  function missingCallAmountStreet(){
    const streets = [
      ['preflop', state.preflopAction],
      ['flop', state.flopAction],
      ['turn', state.turnAction],
      ['river', state.riverAction],
    ];
    for(const [street, action] of streets){
      if((action === 'Bet' || action === 'Call') && document.getElementById(street+'-call-amount').value === ''){
        return street;
      }
    }
    return null;
  }

  // ---------------- BB-multiple quick-select chips ----------------
  // Shared by both the raise and the call/bet amount inputs: a row of
  // chips at common big-blind multiples so you rarely have to type a
  // number by hand. Nothing is pre-filled — the field starts blank and you
  // must tap a chip (or type a custom amount) to confirm it, so a hand can
  // never silently get logged at a default you didn't actually check.
  const RAISE_MULTIPLES = [2, 3, 4, 5, 6];
  const CALL_MULTIPLES = [1, 2, 3, 4, 5, 6];
  function buildBBMultipleChips(chipsContainerId, inputId, multiples){
    const chipsEl = document.getElementById(chipsContainerId);
    const input = document.getElementById(inputId);
    const bb = parseFloat(state.bb);
    chipsEl.innerHTML = '';
    if(!bb) return;
    const current = parseFloat(input.value);
    multiples.forEach(m=>{
      const val = bb * m;
      const b = document.createElement('button');
      b.type = 'button';
      b.className = 'chip' + (current === val ? ' selected' : '');
      b.textContent = m + 'x ($' + val + ')';
      b.addEventListener('click', ()=>{ input.value = val; renderAll(); });
      chipsEl.appendChild(b);
    });
  }

  // ---------------- call/bet amount input helper ----------------
  function updateCallAmountInput(street, action){
    const wrap = document.getElementById(street+'-call-wrap');
    const label = document.getElementById(street+'-call-label');
    if(action === 'Bet' || action === 'Call'){
      wrap.style.display = 'block';
      label.textContent = action === 'Bet' ? 'Bet Amount' : 'Call Amount';
      buildBBMultipleChips(street+'-call-chips', street+'-call-amount', CALL_MULTIPLES);
    } else {
      wrap.style.display = 'none';
    }
  }

  // ---------------- raise input helper ----------------
  // Raise lets you specify the size, defaulting to a 2x-big-blind min-raise
  // the first time it's shown (won't clobber a value you've already typed).
  // The input itself also steps by one big blind.
  function updateRaiseInput(street, action){
    const wrap = document.getElementById(street+'-raise-wrap');
    const input = document.getElementById(street+'-raise-amount');
    if(action === 'Raise'){
      wrap.style.display = 'block';
      if(state.bb){ input.step = state.bb; }
      if(!input.value && state.bb){ input.value = state.bb * 2; }
      buildBBMultipleChips(street+'-raise-chips', street+'-raise-amount', RAISE_MULTIPLES);
    } else {
      wrap.style.display = 'none';
    }
  }

  // ---------------- gate helper ----------------
  function toggleActionSection(street, cardsDone, cardsRemaining){
    const label = document.getElementById(street+'-action-label');
    const chips = document.getElementById(street+'-action-chips');
    const hint = document.getElementById(street+'-hint');
    if(cardsDone){
      label.style.display = '';
      chips.style.display = '';
      hint.style.display = 'none';
    } else {
      label.style.display = 'none';
      chips.style.display = 'none';
      chips.innerHTML = '';
      hint.style.display = 'block';
      hint.textContent = '↑ Pick ' + cardsRemaining + ' more card' + (cardsRemaining===1?'':'s') + ' above to choose your action.';
    }
  }

  // ---------------- main render ----------------
  function renderAll(){
    // position
    buildChipRow('position-chips', POSITIONS, ()=>state.position, (v)=>state.position=v);

    // blinds
    buildChipRow('blinds-chips', BLIND_PRESETS, ()=>state.blindChoice, (v)=>{
      state.blindChoice = v;
      if(v === 'Custom'){
        state.sb = document.getElementById('sb-input').value;
        state.bb = document.getElementById('bb-input').value;
      } else {
        const [sb, bb] = v.split('/');
        state.sb = sb; state.bb = bb;
        document.getElementById('sb-input').value = sb;
        document.getElementById('bb-input').value = bb;
      }
    });
    document.getElementById('custom-blinds-wrap').style.display = (state.blindChoice === 'Custom') ? 'block' : 'none';

    // hole cards
    buildCardUI('hole-slots','hole-picker', state.hole, ()=>{});

    // preflop action
    buildChipRow('preflop-action-chips', ACTIONS_PRE, ()=>state.preflopAction, (v)=>{
      state.preflopAction = v;
      if(v==='Fold'){ state.flop=[null,null,null]; state.flopAction=null; state.turn=[null]; state.turnAction=null; state.river=[null]; state.riverAction=null; }
    });
    updateCallAmountInput('preflop', state.preflopAction);
    updateRaiseInput('preflop', state.preflopAction);

    const playedPreflop = state.preflopAction && state.preflopAction !== 'Fold';
    document.getElementById('street-flop-wrap').style.display = playedPreflop ? 'block' : 'none';

    if(playedPreflop){
      buildCardUI('flop-slots','flop-picker', state.flop, ()=>{});
      const flopCardsDone = state.flop.every(c=>c);
      toggleActionSection('flop', flopCardsDone, 3 - state.flop.filter(c=>c).length);
      if(flopCardsDone){
        buildChipRow('flop-action-chips', ACTIONS_POST, ()=>state.flopAction, (v)=>{
          state.flopAction = v;
          if(v==='Fold'){ state.turn=[null]; state.turnAction=null; state.river=[null]; state.riverAction=null; }
        });
      } else if(state.flopAction){
        state.flopAction = null; // cards were cleared after an action was set; reset so flow stays consistent
      }
      updateCallAmountInput('flop', flopCardsDone ? state.flopAction : null);
      updateRaiseInput('flop', flopCardsDone ? state.flopAction : null);
    }

    const playedFlop = playedPreflop && state.flop.every(c=>c) && state.flopAction && state.flopAction !== 'Fold';
    document.getElementById('street-turn-wrap').style.display = playedFlop ? 'block':'none';
    if(playedFlop){
      buildCardUI('turn-slots','turn-picker', state.turn, ()=>{});
      const turnCardDone = !!state.turn[0];
      toggleActionSection('turn', turnCardDone, turnCardDone ? 0 : 1);
      if(turnCardDone){
        buildChipRow('turn-action-chips', ACTIONS_POST, ()=>state.turnAction, (v)=>{
          state.turnAction = v;
          if(v==='Fold'){ state.river=[null]; state.riverAction=null; }
        });
      } else if(state.turnAction){
        state.turnAction = null;
      }
      updateCallAmountInput('turn', turnCardDone ? state.turnAction : null);
      updateRaiseInput('turn', turnCardDone ? state.turnAction : null);
    }

    const playedTurn = playedFlop && state.turn[0] && state.turnAction && state.turnAction !== 'Fold';
    document.getElementById('street-river-wrap').style.display = playedTurn ? 'block':'none';
    if(playedTurn){
      buildCardUI('river-slots','river-picker', state.river, ()=>{});
      const riverCardDone = !!state.river[0];
      toggleActionSection('river', riverCardDone, riverCardDone ? 0 : 1);
      if(riverCardDone){
        buildChipRow('river-action-chips', ACTIONS_POST, ()=>state.riverAction, (v)=>{ state.riverAction = v; });
      } else if(state.riverAction){
        state.riverAction = null;
      }
      updateCallAmountInput('river', riverCardDone ? state.riverAction : null);
      updateRaiseInput('river', riverCardDone ? state.riverAction : null);
    }

    // fold banner
    const foldedAt = !playedPreflop && state.preflopAction==='Fold' ? 'preflop'
      : (playedPreflop && state.flopAction==='Fold') ? 'the flop'
      : (playedFlop && state.turnAction==='Fold') ? 'the turn'
      : (playedTurn && state.riverAction==='Fold') ? 'the river' : null;
    const banner = document.getElementById('folded-banner');
    if(foldedAt){
      banner.style.display='block';
      banner.textContent = 'Folded ' + foldedAt + ' — later streets skipped.';
    } else {
      banner.style.display='none';
    }

    buildChipRow('result-chips', ['Won','Lost','Chopped'], ()=>state.result, (v)=>state.result=v);
    buildChipRow('showdown-chips', ['Yes','No'], ()=>state.showdown, (v)=>state.showdown=v);
  }

  // ---------------- save ----------------
  document.getElementById('save-hand-btn').addEventListener('click', async ()=>{
    state.sb = document.getElementById('sb-input').value;
    state.bb = document.getElementById('bb-input').value;
    const notes = document.getElementById('notes-input').value;

    if(!state.position || !state.hole[0] || !state.hole[1] || !state.preflopAction || !state.result){
      alert('Please set position, both hole cards, a preflop action, and the result before saving.');
      return;
    }
    if(!activeSession){
      alert('Start tonight\'s session before logging a hand — use the "Start Night" button up top.');
      return;
    }
    const missingStreet = missingCallAmountStreet();
    if(missingStreet){
      alert('Select a ' + missingStreet + ' call/bet amount before saving.');
      return;
    }

    const hand = {
      session_id: activeSession.id,
      ts: Date.now(),
      position: state.position,
      sb: state.sb, bb: state.bb,
      hole: state.hole,
      preflop: {action: state.preflopAction, amount: streetAmount('preflop', state.preflopAction)},
      flop: state.flopAction ? {cards: state.flop, action: state.flopAction, amount: streetAmount('flop', state.flopAction)} : null,
      turn: state.turnAction ? {card: state.turn[0], action: state.turnAction, amount: streetAmount('turn', state.turnAction)} : null,
      river: state.riverAction ? {card: state.river[0], action: state.riverAction, amount: streetAmount('river', state.riverAction)} : null,
      result: state.result,
      showdown: state.showdown === 'Yes',
      notes: notes || '',
    };

    const { data, error } = await supabaseClient.from('hands').insert(hand).select().single();
    if(error){
      alert('Could not save hand: ' + error.message);
      return;
    }
    hands.unshift(data);
    resetState();
    updateHeader();
    renderNightBar();
    renderHistory();
    renderStats();
    switchView('history');
  });

  // ---------------- header ----------------
  // While a night is open, the header reflects that night's hands so far
  // (the number that actually matters while you're at the table). With no
  // night open, it falls back to your lifetime total.
  function updateHeader(){
    const scoped = activeSession ? hands.filter(h=>h.session_id === activeSession.id) : hands;
    document.getElementById('hand-count').textContent = activeSession
      ? scoped.length + (scoped.length===1?' hand this night':' hands this night')
      : hands.length + (hands.length===1?' hand logged':' hands logged');
    const el = document.getElementById('session-net');
    const decided = scoped.filter(h=>h.result==='Won' || h.result==='Lost');
    if(!decided.length){
      el.textContent = '—';
      el.className = 'net';
    } else {
      const winPct = Math.round(100*decided.filter(h=>h.result==='Won').length/decided.length);
      el.textContent = winPct + '% won';
      el.className = 'net ' + (winPct>=50?'pos':'neg');
    }
  }

  // ---------------- history render ----------------
  function cardHtml(c){
    if(!c) return '';
    return '<div class="mini-card' + (c.red?' red':'') + '">' + c.rank + c.suit + '</div>';
  }
  function streetSummary(h){
    let parts = ['Preflop: ' + h.preflop.action + (h.preflop.amount? ' $'+h.preflop.amount:'')];
    if(h.flop) parts.push('Flop ' + h.flop.cards.map(c=>c.rank+c.suit).join(' ') + ': ' + h.flop.action + (h.flop.amount?' $'+h.flop.amount:''));
    if(h.turn) parts.push('Turn ' + h.turn.card.rank+h.turn.card.suit + ': ' + h.turn.action + (h.turn.amount?' $'+h.turn.amount:''));
    if(h.river) parts.push('River ' + h.river.card.rank+h.river.card.suit + ': ' + h.river.action + (h.river.amount?' $'+h.river.amount:''));
    return parts.join('<br>');
  }
  function renderHistory(){
    const el = document.getElementById('history-list');
    if(!hands.length){
      el.innerHTML = '<div class="empty-state">No hands logged yet.<br>Your first entry will show up here.</div>';
      return;
    }
    el.innerHTML = '';
    hands.forEach(h=>{
      const row = document.createElement('div');
      row.className = 'hand-row';
      const date = new Date(h.ts);
      const dateStr = date.toLocaleDateString(undefined,{month:'short',day:'numeric'}) + ' ' + date.toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'});
      const resultCls = h.result==='Won' ? 'pos' : h.result==='Lost' ? 'neg' : 'chop';
      row.innerHTML = `
        <div class="hand-row-top">
          <div class="hand-cards-mini">${cardHtml(h.hole[0])}${cardHtml(h.hole[1])}</div>
          <div class="hand-meta">${h.position} · ${dateStr}</div>
          <div class="hand-net ${resultCls}">${h.result}</div>
        </div>
        <div class="hand-detail">
          Blinds: ${h.sb||'—'}/${h.bb||'—'} &nbsp;·&nbsp; Showdown: ${h.showdown?'Yes':'No'}<br>
          ${streetSummary(h)}
          ${h.notes ? '<br><em>' + escapeHtml(h.notes) + '</em>' : ''}
          <br><button class="del-btn" data-id="${h.id}">Delete hand</button>
        </div>
      `;
      row.addEventListener('click', (e)=>{
        if(e.target.classList.contains('del-btn')) return;
        row.classList.toggle('open');
      });
      row.querySelector('.del-btn').addEventListener('click', async (e)=>{
        e.stopPropagation();
        if(!confirm('Delete this hand?')) return;
        const { error } = await supabaseClient.from('hands').delete().eq('id', h.id);
        if(error){
          alert('Could not delete hand: ' + error.message);
          return;
        }
        hands = hands.filter(x=>x.id !== h.id);
        updateHeader();
        renderNightBar();
        renderHistory();
        renderStats();
      });
      el.appendChild(row);
    });
  }
  function escapeHtml(s){
    return s.replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // ---------------- stats render ----------------
  function statTile(num, label, cls){
    return `<div class="stat-tile"><div class="stat-num ${cls||''}">${num}</div><div class="stat-label">${label}</div></div>`;
  }
  function renderStats(){
    const scoped = handsForStatsSelection();
    const total = scoped.length;
    const topGrid = document.getElementById('stat-grid-top');
    const wonCount = scoped.filter(h=>h.result==='Won').length;
    const lostCount = scoped.filter(h=>h.result==='Lost').length;
    const winPct = total ? Math.round(100*wonCount/total) : 0;
    topGrid.innerHTML =
      statTile(total, 'Hands Logged') +
      statTile(total ? winPct+'%' : '—', 'Win Rate', winPct>=50?'pos':'neg') +
      statTile(wonCount, 'Won', 'pos') +
      statTile(lostCount, 'Lost', 'neg');

    const preGrid = document.getElementById('stat-grid-preflop');
    const vpip = total ? Math.round(100*scoped.filter(h=>h.preflop.action!=='Fold').length/total) : 0;
    const pfr = total ? Math.round(100*scoped.filter(h=>h.preflop.action==='Raise').length/total) : 0;
    preGrid.innerHTML =
      statTile(total? vpip+'%':'—', 'VPIP') +
      statTile(total? pfr+'%':'—', 'PFR');

    const posEl = document.getElementById('pos-breakdown');
    if(!total){
      posEl.innerHTML = '<div class="empty-state" style="padding:20px;">Log hands to see position breakdown.</div>';
    } else {
      const byPos = {};
      scoped.forEach(h=>{ byPos[h.position] = byPos[h.position] || {won:0,count:0}; if(h.result==='Won') byPos[h.position].won++; byPos[h.position].count++; });
      posEl.innerHTML = POSITIONS.filter(p=>byPos[p]).map(p=>{
        const v = byPos[p];
        const pct = Math.round(100*v.won/v.count);
        const color = pct>=50 ? 'var(--win)' : 'var(--loss)';
        return `<div class="pos-bar-row">
          <div class="pos-bar-label">${p}</div>
          <div class="pos-bar-track"><div class="pos-bar-fill" style="width:${pct}%; background:${color};"></div></div>
          <div class="pos-bar-val" style="color:${color};">${pct}% (${v.count})</div>
        </div>`;
      }).join('');
    }

    const sdGrid = document.getElementById('stat-grid-showdown');
    const sdHands = scoped.filter(h=>h.showdown);
    const sdWinPct = sdHands.length ? Math.round(100*sdHands.filter(h=>h.result==='Won').length/sdHands.length) : 0;
    sdGrid.innerHTML =
      statTile(sdHands.length, 'Times to Showdown') +
      statTile(sdHands.length? sdWinPct+'%' : '—', 'Won at Showdown');
  }

  // ---------------- tabs ----------------
  function switchView(name){
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    document.getElementById('view-'+name).classList.add('active');
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active', b.dataset.view===name));
  }
  document.querySelectorAll('.tab-btn').forEach(b=>{
    b.addEventListener('click', ()=>switchView(b.dataset.view));
  });

  // Custom blinds bypass the preset chips, so state.sb/bb need to update
  // live as the user types — otherwise the raise quick-select chips (which
  // read state.bb) never pick up a custom big blind until save time.
  ['sb-input','bb-input'].forEach(id=>{
    document.getElementById(id).addEventListener('input', ()=>{
      if(state.blindChoice === 'Custom'){
        state.sb = document.getElementById('sb-input').value;
        state.bb = document.getElementById('bb-input').value;
        renderAll();
      }
    });
  });

  // ---------------- init ----------------
  // Hand data loads once onAuthStateChange reports a session (fires
  // immediately with the current session on page load, including none).
  renderAll();

})();
</script>
</body>
</html>
